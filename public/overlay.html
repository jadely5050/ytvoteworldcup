<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>vMix Overlay</title>
<style>
  /* vMix Web Browser 입력은 body 배경이 투명하면 알파로 합성됩니다.
     해상도는 1920x1080 기준으로 좌표 배치. vMix Input 크기도 1920x1080로. */
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body {
    width: 1920px; height: 1080px;
    background: transparent;
    overflow: hidden;
    font-family: "Pretendard", "Noto Sans KR", -apple-system, sans-serif;
    color: #1a1a1a;
  }
  .stage { position: absolute; inset: 0; transition: opacity .6s ease; }

  /* ---------- 하단 투표 패널 ---------- */
  .poll {
    position: absolute;
    left: 60px; bottom: 60px;
    width: 1480px;
    background: rgba(248, 249, 251, 0.96);
    border-radius: 22px;
    padding: 22px 30px 26px;
    box-shadow: 0 12px 40px rgba(0,0,0,.35);
    backdrop-filter: blur(4px);
    transition: transform .3s ease;
  }
  /* 멀티(제일 ??한 ??은?) 그래픽은 전체 0.7배 */
  .poll.compact { transform: scale(.7); transform-origin: left bottom; }

  .poll-head { display: flex; align-items: center; gap: 16px; margin-bottom: 16px; }
  .poll-head .q { font-size: 30px; font-weight: 800; letter-spacing: -.5px; }
  .poll-head .qkr { font-size: 22px; font-weight: 600; color: #444; }
  .poll-head .headtotal {
    margin-left: auto; font-size: 34px; font-weight: 900; color: #111; line-height: 1;
  }
  .poll-head .headtotal small { font-size: 18px; font-weight: 700; color: #777; margin-left: 4px; }
  .poll-head .live {
    display: flex; align-items: center; gap: 10px;
    font-size: 15px; color: #555;
  }
  /* headtotal 이 보이면 그게 우측 정렬을 맡고, 없으면 live 가 맡음 */
  .poll-head .headtotal[hidden] + .live { margin-left: auto; }
  .live .badge {
    background: #e23b2e; color: #fff; font-weight: 800; font-size: 14px;
    padding: 5px 11px; border-radius: 20px; letter-spacing: .5px;
    animation: pulse 1.6s infinite;
  }
  .live .badge.closed { background: #555; animation: none; }
  @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:.55} }

  /* 퍼센트 행 */
  .pct-row { display: flex; align-items: flex-end; justify-content: space-between; margin-bottom: 10px; }
  .pct-side { display: flex; align-items: center; gap: 12px; }
  .pct-side.right { flex-direction: row-reverse; }
  .pct-num { font-size: 46px; font-weight: 900; line-height: 1; }
  .pct-label { font-size: 19px; font-weight: 700; color: #333; }
  .pct-mid { font-size: 18px; font-weight: 700; color: #777; padding-bottom: 6px; }

  /* 게이지 바 */
  .bar {
    position: relative; height: 60px; border-radius: 12px; overflow: hidden;
    display: flex; box-shadow: inset 0 2px 6px rgba(0,0,0,.18);
  }
  .bar .seg {
    height: 100%; display: flex; align-items: center;
    transition: width .6s cubic-bezier(.22,.61,.36,1);
    color: #fff; font-weight: 800; font-size: 23px; white-space: nowrap;
    overflow: hidden;
  }
  .bar .seg.left  { justify-content: flex-start; padding-left: 22px; }
  .bar .seg.right { justify-content: flex-end;  padding-right: 22px; }
  .seg .sub { font-size: 15px; font-weight: 600; opacity: .9; margin-left: 8px; }
  .seg.right .sub { margin: 0 8px 0 0; }

  .poll-foot {
    text-align: center; margin-top: 12px;
    font-size: 17px; font-weight: 700; color: #555;
  }
  .poll-foot b { color: #111; }

  /* ---------- 멀티(3~5개) 가로막대 ---------- */
  .multi { display: flex; flex-direction: column; gap: 14px; }
  .mrow { display: flex; align-items: center; gap: 18px; }
  .mrow .mname {
    width: 300px; flex: none; font-size: 27px; font-weight: 800;
    white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
  }
  .mrow .mtrack {
    flex: 1; height: 50px; border-radius: 11px; overflow: hidden;
    background: rgba(0,0,0,.07); box-shadow: inset 0 2px 6px rgba(0,0,0,.15);
  }
  .mrow .mfill {
    height: 100%; min-width: 6px; border-radius: 11px;
    transition: width .6s cubic-bezier(.22,.61,.36,1);
    display: flex; align-items: center; justify-content: flex-end;
    padding-right: 14px; color: #fff; font-weight: 800; font-size: 20px;
  }
  .mrow .mpct {
    width: 130px; flex: none; text-align: right;
    font-size: 38px; font-weight: 900; line-height: 1;
  }
  .mrow .mpct { transform-origin: right center; }
  .mrow .mpct .mcnt { display: block; font-size: 15px; font-weight: 700; color: #888; }

  /* ---------- 득표 강조 효과 ---------- */
  /* 막대 트랙 번쩍번쩍 (2회 펄스) */
  @keyframes barGlow {
    0%, 100% { box-shadow: inset 0 2px 6px rgba(0,0,0,.15), 0 0 0 0 rgba(255,235,120,0); }
    18%, 58% { box-shadow: inset 0 2px 6px rgba(0,0,0,.15), 0 0 28px 8px rgba(255,235,120,.98); }
    38%, 80% { box-shadow: inset 0 2px 6px rgba(0,0,0,.15), 0 0 6px 1px rgba(255,235,120,.25); }
  }
  /* 막대 채움 색이 밝아졌다 돌아옴 */
  @keyframes barBright {
    0%, 100% { filter: brightness(1) saturate(1); }
    18%, 58% { filter: brightness(1.5) saturate(1.35); }
    38%, 80% { filter: brightness(1); }
  }
  .mrow.flash .mtrack { animation: barGlow .9s ease; }
  .mrow.flash .mfill  { animation: barBright .9s ease; }

  /* 숫자/퍼센트가 잠깐 커졌다 돌아옴 */
  @keyframes numPop {
    0%   { transform: scale(1); }
    35%  { transform: scale(1.42); }
    62%  { transform: scale(.94); }
    100% { transform: scale(1); }
  }
  .mrow .mpct.pop { animation: numPop .62s cubic-bezier(.34,1.56,.64,1); }

  /* ---------- 그림 모드 ---------- */
  /* 그림 모드는 패널 폭을 내용에 맞춤(후보 수에 따라 가로폭 자동 조정) + 전체 0.7배 */
  .poll.imgpanel { width: auto; max-width: 1800px; transform: scale(.7); transform-origin: left bottom; }
  .imgmode {
    display: flex; align-items: flex-end; justify-content: center;
    gap: 40px; padding: 8px 4px 4px;
  }
  /* 칸: 이름(위) + [그림 + 득표수](아래) 세로 배치 */
  .icell { display: flex; flex-direction: column; align-items: center; gap: 10px; }
  .iname {
    font-size: 34px; font-weight: 800; letter-spacing: -.5px; white-space: nowrap;
    text-align: center; max-width: 420px; overflow: hidden; text-overflow: ellipsis;
  }
  .ibody { display: flex; align-items: center; gap: 4px; }
  /* 알파 PNG가 패널 위에 그대로 올라감 (자체 배경 없음) */
  .iart {
    flex: none; display: flex; align-items: center; justify-content: center;
    transform-origin: center center;
  }
  /* 박스는 고정 크기(프레임마다 폭이 달라 그림이 들썩이는 것 방지),
     비율은 첫 프레임에 맞춰 좌우 여백 최소화 */
  .iart img {
    display: block; width: 100%; height: 100%; object-fit: contain;
    filter: drop-shadow(0 6px 14px rgba(0,0,0,.28));
  }
  .iart.placeholder {
    align-items: center; border: 2px dashed rgba(0,0,0,.18); border-radius: 14px;
    color: #999; font-weight: 800; font-size: 22px; text-align: center;
  }
  .inums { display: flex; flex-direction: column; align-items: flex-start; line-height: 1; }
  .inums .icount { font-size: 46px; font-weight: 900; transform-origin: left center; }
  .inums .ipct { font-size: 22px; font-weight: 800; color: #777; margin-top: 6px; }

  /* 득표 시 "띠용" 바운스 (그림 + 숫자 공용) */
  @keyframes boing {
    0%   { transform: scale(1, 1); }
    20%  { transform: scale(1.18, .86); }
    45%  { transform: scale(.9, 1.14); }
    65%  { transform: scale(1.06, .96); }
    82%  { transform: scale(.98, 1.02); }
    100% { transform: scale(1, 1); }
  }
  .iart.boing  { animation: boing .6s cubic-bezier(.28,1.5,.5,1); }
  .icount.boing { animation: boing .6s cubic-bezier(.28,1.5,.5,1); }

  /* ---------- 우측 채팅 패널 ---------- */
  .chat {
    position: absolute; right: 60px; bottom: 60px;
    width: 300px; height: 360px;
    background: rgba(248, 249, 251, 0.96);
    border-radius: 22px; padding: 18px 20px;
    box-shadow: 0 12px 40px rgba(0,0,0,.35);
    display: flex; flex-direction: column;
  }
  .chat-head { flex: none; display:flex; align-items:center; justify-content:space-between;
    font-size: 26px; font-weight: 800; margin-bottom: 12px; }
  /* 고정 높이 + 아래 정렬: 메시지가 길어도 박스 크기 그대로(위로 넘치는 옛 메시지는 잘림) */
  .chat-list { flex: 1; min-height: 0; display: flex; flex-direction: column;
    justify-content: flex-end; gap: 9px; overflow: hidden; }
  .chat-msg { font-size: 19px; line-height: 1.25; animation: slideIn .35s ease; }
  .chat-msg .name { font-weight: 700; color: #2a64c4; margin-right: 6px; }
  .chat-msg .cbadge { width: 20px; height: 20px; vertical-align: -4px; margin-right: 3px; border-radius: 4px; }
  .chat-msg .cemote { width: 30px; height: 30px; vertical-align: -8px; margin: 0 1px; }
  .chat-msg.sc { background:#ffd54a; border-radius:8px; padding:6px 9px; font-weight:600; }
  @keyframes slideIn { from{opacity:0; transform:translateY(8px)} to{opacity:1; transform:none} }

  .disconnected { position: absolute; top: 12px; left: 12px; color:#e23b2e;
    font-size:14px; font-weight:700; display:none; }

  /* ---------- 하단 채팅 스크롤(우→좌 마퀴) ---------- */
  /* 우측 채팅 패널과 동일한 내용을 얇은 가로 바로 흘려보낸다. 클래스명은
     .chat / .chat-msg 등 기존 채팅 패널 선택자와 절대 겹치지 않게 별도 네이밍(scroll-*) 사용. */
  .scrollbar {
    position: absolute; left: 0; right: 0; bottom: 0;
    height: 54px; overflow: hidden;
    background: rgba(10, 12, 16, 0.55);
    opacity: 0; transition: opacity .6s ease; /* 시작/정지 시 서서히 fade in/out */
  }
  .scrollbar.show { opacity: 1; }
  /* 각 칩은 절대 위치이며, 위치는 JS 가 "서버 타임스탬프 + 벽시계" 기준으로 매 프레임
     계산해 translate3d 로 찍는다(아래 스크립트 참고). 로컬 타이머로 위치를 누적하면
     화면(PGM/PVW/직접 연 탭)마다 접속 시점·프레임 지연 차이가 쌓여 서로 어긋난다. */
  .scrollbar-track {
    position: absolute; left: 0; top: 0; width: 100%; height: 100%;
  }
  .scroll-chip {
    position: absolute; left: 0; top: 0; height: 100%;
    display: inline-flex; align-items: center; white-space: nowrap;
    font-size: 22px; line-height: 1; padding: 0 34px;
    will-change: transform;
    transform: translate3d(4000px, 0, 0); /* 첫 프레임 계산 전까지 화면 밖 대기 */
  }
  .scroll-chip .scroll-name { font-weight: 700; color: #6fb1ff; margin-right: 8px; }
  .scroll-chip .scroll-text { color: #f2f4f8; }
  .scroll-chip.guide .scroll-text { color: #ffd45a; font-weight: 800; }
</style>
</head>
<body>
<div class="stage" id="stage">
  <div class="disconnected" id="disc">● 서버 연결 끊김</div>

  <div class="poll" id="poll">
    <div class="poll-head">
      <span class="q" id="q">WHO WILL WIN?</span>
      <span class="headtotal" id="headTotal" hidden></span>
      <span class="live"><span class="badge" id="badge">LIVE POLL</span></span>
    </div>

    <!-- 2개: 좌우 게이지 -->
    <div id="duo">
      <div class="pct-row">
        <div class="pct-side left">
          <span class="pct-num" id="pctL" style="color:#1e6fd6">0%</span>
          <span class="pct-label" id="labL"></span>
        </div>
        <div class="pct-mid"><span id="cntL">0</span>/<span id="cntR">0</span></div>
        <div class="pct-side right">
          <span class="pct-num" id="pctR" style="color:#d6281e">0%</span>
          <span class="pct-label" id="labR"></span>
        </div>
      </div>

      <div class="bar">
        <div class="seg left"  id="segL" style="width:50%;background:#1e6fd6">
          <span id="nameL">TEAM BLUE</span><span class="sub" id="subL"></span>
        </div>
        <div class="seg right" id="segR" style="width:50%;background:#d6281e">
          <span id="nameR">TEAM RED</span><span class="sub" id="subR"></span>
        </div>
      </div>
    </div>

    <!-- 3~5개: 가로막대 -->
    <div id="multi" class="multi" style="display:none"></div>

    <!-- 3~5개: 그림 모드(가로 배치, 각 우측에 득표수) -->
    <div id="imgmode" class="imgmode" style="display:none"></div>

    <div class="poll-foot" id="pollFoot"><b id="total">0</b> 투표</div>
  </div>

  <div class="chat" id="chatPanel" style="display:none">
    <div class="chat-head">CHAT <span>💬</span></div>
    <div class="chat-list" id="chatList"></div>
  </div>

  <div class="scrollbar" id="scrollbar">
    <div class="scrollbar-track" id="scrollbarTrack"></div>
  </div>
</div>

<script>
const $ = (id) => document.getElementById(id);
const maxChat = 6;

// ----- 띠용(득표 바운스) 강도 1~5 -----
// 강도 5 = 현재(가장 큼), 1 = 가장 잔잔. 강도별 keyframe 을 1회 생성해 주입한다.
function buildBoingKeyframes() {
  // [퍼센트, scaleX, scaleY] — 강도 5 기준 편차
  const stops = [
    [0, 1.00, 1.00], [20, 1.18, 0.86], [45, 0.90, 1.14],
    [65, 1.06, 0.96], [82, 0.98, 1.02], [100, 1.00, 1.00],
  ];
  let css = "";
  for (let lvl = 1; lvl <= 5; lvl++) {
    const f = lvl / 5; // 편차 비율(강도 5 → 1.0)
    let kf = `@keyframes boing${lvl}{`;
    for (const [p, sx, sy] of stops) {
      const x = (1 + (sx - 1) * f).toFixed(3);
      const y = (1 + (sy - 1) * f).toFixed(3);
      kf += `${p}%{transform:scale(${x},${y})}`;
    }
    kf += "}";
    css += kf + `.iart.boing${lvl},.icount.boing${lvl}{animation:boing${lvl} .6s cubic-bezier(.28,1.5,.5,1)}`;
  }
  const style = document.createElement("style");
  style.textContent = css;
  document.head.appendChild(style);
}
buildBoingKeyframes();

// 강도(lvl)에 맞는 띠용 클래스 재적용(이전 강도 클래스 제거 후 재시작)
function triggerBoing(el, lvl) {
  const n = lvl >= 1 && lvl <= 5 ? lvl : 3;
  for (let i = 1; i <= 5; i++) el.classList.remove("boing" + i);
  void el.offsetWidth;
  el.classList.add("boing" + n);
}

function renderPoll(p) {
  $("q").textContent = p.question || "";
  $("q").style.display = p.question ? "" : "none";
  const totalStr = (p.total || 0).toLocaleString();
  $("total").textContent = totalStr;
  $("headTotal").innerHTML = totalStr + ' <small>투표</small>';

  // 채팅창 표시 토글
  $("chatPanel").style.display = p.showChat ? "" : "none";

  // 하단 스크롤 설정 반영(내용은 addChat 에서 이미 우측 채팅과 동일하게 누적됨)
  applyScrollConfig(p.scroll);

  // 집계 종료 시 배지 변경
  $("badge").textContent = p.closed ? "투표 종료" : "LIVE POLL";
  $("badge").classList.toggle("closed", !!p.closed);

  const teams = p.teams || [];
  // 그림 모드(best 템플릿)는 선택지 개수와 무관하게 우선 적용. 그 외엔 개수로 duo/multi 구분.
  if (p.graphicMode === "image" && p.template !== "winner") renderImageMode(teams, p);
  else if (teams.length <= 2) renderDuo(teams);
  else renderMulti(teams);
}

function renderDuo(teams) {
  $("duo").style.display = "";
  $("multi").style.display = "none";
  $("imgmode").style.display = "none";
  stopImageLoop();
  $("poll").classList.remove("compact", "imgpanel");
  $("headTotal").hidden = true;
  $("pollFoot").style.display = "";
  const [L, R] = teams;
  if (!L || !R) return;

  $("pctL").textContent = L.pct + "%";
  $("pctR").textContent = R.pct + "%";
  $("pctL").style.color = L.color;
  $("pctR").style.color = R.color;
  $("cntL").textContent = L.count;
  $("cntR").textContent = R.count;
  $("nameL").textContent = L.name;
  $("nameR").textContent = R.name;
  $("subL").textContent = L.subName || "";
  $("subR").textContent = R.subName || "";
  $("segL").style.background = L.color;
  $("segR").style.background = R.color;
  // 0%일 때 바가 사라지지 않게 최소 폭 보정
  const lw = Math.max(8, L.pct), rw = Math.max(8, R.pct);
  const sum = lw + rw;
  $("segL").style.width = (lw / sum * 100) + "%";
  $("segR").style.width = (rw / sum * 100) + "%";
}

// 후보별 DOM/직전 득표수를 유지해서 in-place 업데이트 → 막대 늘어남 + 득표 강조 가능
let multiState = [];

function buildMultiRow(t) {
  const row = document.createElement("div");
  row.className = "mrow";

  const mname = document.createElement("div");
  mname.className = "mname";

  const mtrack = document.createElement("div");
  mtrack.className = "mtrack";
  const mfill = document.createElement("div");
  mfill.className = "mfill";
  mtrack.appendChild(mfill);

  const mpct = document.createElement("div");
  mpct.className = "mpct";
  const pctText = document.createTextNode("");
  const mcnt = document.createElement("span");
  mcnt.className = "mcnt";
  mpct.appendChild(pctText);
  mpct.appendChild(mcnt);

  row.append(mname, mtrack, mpct);
  return { name: t.name, count: -1, els: { row, mname, mtrack, mfill, mpct, pctText, mcnt } };
}

// 한 번 끝난 애니메이션을 다시 재생시키려면 클래스 제거 → 리플로우 → 재추가
function retrigger(el, cls) {
  el.classList.remove(cls);
  void el.offsetWidth;
  el.classList.add(cls);
}

function renderMulti(teams) {
  $("duo").style.display = "none";
  $("multi").style.display = "";
  $("imgmode").style.display = "none";
  stopImageLoop();
  $("poll").classList.remove("imgpanel");
  $("poll").classList.add("compact");
  $("headTotal").hidden = false;
  $("pollFoot").style.display = "none";
  const box = $("multi");

  // 후보 개수/이름이 바뀌면 새로 구성(애니메이션 없이)
  const sameStructure =
    multiState.length === teams.length &&
    teams.every((t, i) => multiState[i].name === t.name);

  if (!sameStructure) {
    box.innerHTML = "";
    multiState = teams.map((t) => {
      const st = buildMultiRow(t);
      box.appendChild(st.els.row);
      return st;
    });
  }

  teams.forEach((t, i) => {
    const st = multiState[i];
    const e = st.els;

    e.mname.style.color = t.color;
    e.mname.textContent = t.name;
    e.mfill.style.width = Math.max(2, t.pct) + "%";
    e.mfill.style.background = t.color;
    e.mfill.textContent = t.pct >= 12 ? t.pct + "%" : "";
    e.mpct.style.color = t.color;
    e.pctText.nodeValue = t.pct + "%";
    e.mcnt.textContent = t.count + "표";

    // 직전보다 득표가 늘었으면 강조: 막대 번쩍 + 숫자/퍼센트 팝
    if (st.count >= 0 && t.count > st.count) {
      retrigger(e.row, "flash");
      retrigger(e.mpct, "pop");
    }
    st.count = t.count;
  });
}

// ---------- 그림 모드 ----------
// 칸별 DOM/프레임/직전 득표수 캐시. 단일 rAF 루프로 모든 칸 시퀀스를 반복 재생.
let imageState = [];
let imgFps = 24;
let imgRAF = null;
let imgLastTs = 0;

// 후보 수에 따른 그림 높이(폭은 그림 비율대로 auto). w 는 그림 없는 placeholder 용.
function artBox(n) {
  if (n <= 2) return { w: 240, h: 240 };
  if (n === 3) return { w: 210, h: 210 };
  if (n === 4) return { w: 185, h: 185 };
  return { w: 165, h: 170 };
}

function buildImageCell(t, n) {
  const dir = (t.image && t.image.dir) || "";
  const count = (t.image && t.image.count) || 0;
  const box = artBox(n);

  const cell = document.createElement("div");
  cell.className = "icell";

  // 사진 위에 표시 이름(투표 안내: "1. 메시" 처럼 번호 포함)
  const nameEl = document.createElement("div");
  nameEl.className = "iname";
  nameEl.style.color = t.color;
  nameEl.textContent = t.name || "보기";

  const art = document.createElement("div");
  art.className = "iart";
  art.style.height = box.h + "px";
  art.style.width = box.h + "px"; // 기본 정사각(고정) → 프레임 바뀌어도 안 들썩임

  // 시퀀스 프레임 preload (캐시 → src 교체 시 깜빡임 없음)
  const frames = [];
  let img = null;
  if (dir && count > 0) {
    for (let i = 1; i <= count; i++) {
      const im = new Image();
      im.src = dir + "frame_" + String(i).padStart(4, "0") + ".png";
      frames.push(im);
    }
    // 첫 프레임 비율로 박스 폭을 한 번만 확정(좌우 여백 최소화, 이후 고정)
    const fitBox = () => {
      const w = frames[0].naturalWidth, h = frames[0].naturalHeight;
      if (w && h) art.style.width = Math.round(box.h * (w / h)) + "px";
    };
    if (frames[0].complete) fitBox(); else frames[0].onload = fitBox;
    img = document.createElement("img");
    img.src = frames[0].src;
    img.alt = t.name || "";
    art.appendChild(img);
  } else {
    art.style.width = box.w + "px"; // 그림 없을 때만 고정 폭
    art.classList.add("placeholder");
    art.textContent = t.name || "?";
  }

  const nums = document.createElement("div");
  nums.className = "inums";
  const cntEl = document.createElement("div");
  cntEl.className = "icount";
  const pctEl = document.createElement("div");
  pctEl.className = "ipct";
  nums.append(cntEl, pctEl);

  const body = document.createElement("div");
  body.className = "ibody";
  body.append(art, nums);

  cell.append(nameEl, body);
  return {
    name: t.name, dir, count, frame: 0, prevCount: -1, frames,
    els: { cell, art, img, cntEl, pctEl },
  };
}

function imageLoop(ts) {
  imgRAF = requestAnimationFrame(imageLoop);
  if (!imageState.length) return;
  const interval = 1000 / (imgFps || 24);
  if (ts - imgLastTs < interval) return;
  imgLastTs = ts;
  for (const st of imageState) {
    if (st.count > 1 && st.frames.length > 1 && st.els.img) {
      st.frame = (st.frame + 1) % st.frames.length;
      st.els.img.src = st.frames[st.frame].src;
    }
  }
}
function startImageLoop() { if (!imgRAF) { imgLastTs = 0; imgRAF = requestAnimationFrame(imageLoop); } }
function stopImageLoop() { if (imgRAF) { cancelAnimationFrame(imgRAF); imgRAF = null; } }

function renderImageMode(teams, p) {
  $("duo").style.display = "none";
  $("multi").style.display = "none";
  $("imgmode").style.display = "";
  $("poll").classList.remove("compact");
  $("poll").classList.add("imgpanel");
  $("headTotal").hidden = false;
  $("pollFoot").style.display = "none";
  imgFps = p.imageFps || 24;

  const box = $("imgmode");
  // 개수/이름/그림(dir,count)이 같으면 in-place, 아니면 새로 구성
  const same =
    imageState.length === teams.length &&
    teams.every((t, i) => {
      const s = imageState[i];
      const dir = (t.image && t.image.dir) || "";
      const cnt = (t.image && t.image.count) || 0;
      return s.name === t.name && s.dir === dir && s.count === cnt;
    });

  if (!same) {
    box.innerHTML = "";
    imageState = teams.map((t) => buildImageCell(t, teams.length));
    imageState.forEach((s) => box.appendChild(s.els.cell));
  }
  startImageLoop();

  teams.forEach((t, i) => {
    const st = imageState[i];
    const e = st.els;
    e.cntEl.textContent = (t.count || 0).toLocaleString();
    e.cntEl.style.color = t.color;
    e.pctEl.textContent = "(" + (t.pct || 0) + "%)";

    // 득표 증가 시 "띠용": 그림 + 숫자 (보기별 강도 1~5)
    if (st.prevCount >= 0 && t.count > st.prevCount) {
      const lvl = t.boing || 3;
      triggerBoing(e.art, lvl);
      triggerBoing(e.cntEl, lvl);
    }
    st.prevCount = t.count;
  });
}

// 플랫폼 상징색: YouTube 빨강 / 치지직 초록(가독성 위해 약간 진하게)
function sourceColor(src) {
  if (src === "chzzk") return "#00b265";
  if (src === "yt") return "#ff0000";
  return ""; // 알 수 없음 → 기본(CSS) 색
}
// 치지직/네이버 + 유튜브/구글 CDN 이미지 URL만 허용(보안). 아니면 빈 문자열.
function safeImg(url, cls) {
  if (typeof url !== "string") return "";
  if (!/^https:\/\/[a-z0-9.-]+\.(pstatic\.net|naver\.com|ggpht\.com|googleusercontent\.com|ytimg\.com|gstatic\.com|youtube\.com)\//i.test(url)) return "";
  return `<img class="${cls}" src="${url.replace(/"/g, "%22")}" alt="" />`;
}
// 메시지 텍스트의 {:키:} 이모티콘 토큰을 이미지로 치환(텍스트는 먼저 이스케이프).
function renderChatText(text, emojis) {
  let html = escapeHtml(text || "");
  if (emojis && typeof emojis === "object") {
    html = html.replace(/\{:([^:}]+):\}/g, (tok, key) => {
      const img = safeImg(emojis[key], "cemote");
      return img || tok;
    });
  }
  return html;
}
function addChat(m) {
  const list = $("chatList");
  const div = document.createElement("div");
  div.className = "chat-msg" + (m.isSuperchat ? " sc" : "");
  const color = sourceColor(m.source);
  const nameStyle = color ? ` style="color:${color}"` : "";
  let badges = "";
  if (Array.isArray(m.badges)) for (const b of m.badges) badges += safeImg(b, "cbadge");
  div.innerHTML =
    badges +
    `<span class="name"${nameStyle}>${escapeHtml(m.author || "")}</span>` +
    renderChatText(m.text, m.emojis);
  list.appendChild(div);
  while (list.children.length > maxChat) list.removeChild(list.firstChild);
  // 하단 스크롤은 여기서 처리하지 않는다 — 서버가 발행하는 scrollItem/scrollHistory
  // 메시지(타임스탬프 포함)로만 그려서 모든 화면이 동일한 위치를 유지한다.
}

function escapeHtml(s) {
  return String(s).replace(/[&<>"']/g, (c) =>
    ({ "&": "&amp;", "<": "&lt;", ">": "&gt;", '"': "&quot;", "'": "&#39;" }[c]));
}

/* ---------- 하단 채팅 스크롤(우→좌, 서버 타임스탬프 기준 렌더링) ---------- */
// 스크롤 항목은 서버가 발행하며(scrollItem/scrollHistory), 각 항목에 서버 시각(ts)이
// 찍혀 있다. 클라이언트는 위치를 로컬 타이머로 누적하지 않고 매 프레임
// "지금 시각 − 진입 시각" 으로 계산한다. 그래서 어느 화면(PGM/PVW/직접 연 탭)이든,
// 언제 접속했든, 프레임이 밀렸다 풀려도 같은 순간엔 항상 같은 위치에 그려진다.
// 서버의 첫 poll 메시지가 도착하기 전까지의 기본값. 기본은 정지(꺼짐).
let scrollCfg = { enabled: false, showAuthor: true, showGuideText: true, guideText: "투표해주세요!", guideFrequency: 5, speed: 5 };
let scrollRaw = []; // 서버가 발행한 원본 항목 { seq, ts, type, author, text }
let scrollChips = []; // 화면에 올라간 칩 { seq, ts, el, w, entry } (entry = 우측 끝 진입 시각 ms)
let scrollRafId = null;
const SCROLL_RAW_MAX = 60;
// 채팅 폭주 시 대기열이 이 이상 밀리면 "아직 진입 전인 오래된 항목"을 버리고 최신
// 채팅을 우선 태운다 — 우측 채팅창(최신만 표시)과 신선도를 맞추기 위함.
const SCROLL_MAX_BACKLOG_MS = 8000;

function scrollPxPerSec() {
  const speed = Math.max(1, Math.min(10, scrollCfg.speed || 5));
  return 30 + (speed - 1) * 30; // 1(느림, 30px/s) ~ 10(빠름, 300px/s)
}

function applyScrollConfig(cfg) {
  if (!cfg) return;
  const wasEnabled = scrollCfg.enabled;
  scrollCfg = Object.assign({}, scrollCfg, cfg);
  // display 대신 opacity(CSS transition)로 서서히 fade in/out. 끌 때도 루프는 계속 돌아
  // 남은 칩이 자연스럽게 흘러 나가고(멈춘 채 사라지지 않음), 서버가 켤 때 큐를
  // 비워주므로(scrollHistory []) 다시 켜면 우측 끝에서 새로 시작한다.
  $("scrollbar").classList.toggle("show", !!scrollCfg.enabled);
  if (scrollCfg.enabled && !wasEnabled) rebuildScrollChips();
}

function makeScrollChip(item) {
  const chip = document.createElement("span");
  chip.className = "scroll-chip" + (item.type === "guide" ? " guide" : "");
  if (item.type === "chat" && item.author) {
    const name = document.createElement("span");
    name.className = "scroll-name";
    name.textContent = item.author;
    const color = sourceColor(item.source); // 우측 채팅창과 동일한 규칙: 치지직/유튜브 플랫폼 색상
    if (color) name.style.color = color;
    chip.appendChild(name);
  }
  const text = document.createElement("span");
  text.className = "scroll-text";
  // 이모티콘 토큰({:키:})은 하단 스크롤(작은 한 줄)에는 이미지 대신 텍스트만 남기고 제거.
  text.textContent = String(item.text || "").replace(/\{:[^:}]+:\}/g, "").trim();
  chip.appendChild(text);
  return chip;
}

// 서버 항목 1건을 화면 칩으로 올린다. 진입 시각(entry)은 "서버 ts" 와 "앞 칩이 다
// 들어온 시각" 중 늦은 쪽 — 같은 데이터로 계산하므로 모든 화면에서 동일한 값이 나온다.
function addScrollChip(item) {
  const track = $("scrollbarTrack");
  const el = makeScrollChip(item);
  track.appendChild(el);
  const w = el.getBoundingClientRect().width;
  const v = scrollPxPerSec();
  let prev = scrollChips[scrollChips.length - 1];
  let entry = prev ? Math.max(item.ts, prev.entry + (prev.w / v) * 1000) : item.ts;
  // 대기열이 너무 밀리면 "이 항목이 도착한 시점(ts)에 아직 진입 전이던" 오래된 대기
  // 칩부터 버려 최신 채팅을 우선 태운다. 판정에 로컬 시계를 쓰지 않고 공유 데이터
  // (ts·entry)만 쓰므로 모든 화면이 똑같이 버리고 똑같이 남긴다.
  while (prev && entry - item.ts > SCROLL_MAX_BACKLOG_MS && prev.entry > item.ts) {
    prev.el.remove();
    scrollChips.pop();
    prev = scrollChips[scrollChips.length - 1];
    entry = prev ? Math.max(item.ts, prev.entry + (prev.w / v) * 1000) : item.ts;
  }
  scrollChips.push({ seq: item.seq, ts: item.ts, el, w, entry });
  startScrollLoop();
}

function onScrollItem(item) {
  scrollRaw.push(item);
  if (scrollRaw.length > SCROLL_RAW_MAX) scrollRaw.shift();
  if (scrollCfg.enabled) addScrollChip(item);
}

// 접속(재접속) 시 서버가 보내주는 최근 항목으로 전체 재구성 — 늦게 열린 화면도
// 같은 ts 기준으로 계산하므로 이미 떠 있던 화면과 동일한 위치에서 시작한다.
function onScrollHistory(list) {
  scrollRaw = Array.isArray(list) ? list.slice(-SCROLL_RAW_MAX) : [];
  rebuildScrollChips();
}

function rebuildScrollChips() {
  for (const c of scrollChips) c.el.remove();
  scrollChips = [];
  if (!scrollCfg.enabled) return;
  for (const item of scrollRaw) addScrollChip(item);
}

function startScrollLoop() {
  if (scrollRafId != null) return;
  scrollRafId = requestAnimationFrame(scrollTick);
}

// ----- 서보 클록: vsync 에 정렬된 부드러운 벽시계 근사 -----
// Date.now() 를 매 프레임 직접 읽으면 rAF(vsync) 와 정렬되지 않아 프레임당 이동량이
// 널뛰고(실측: 0px 멈춤 → 9~11px 점프 반복), 프레임이 밀리면 밀린 만큼을 다음
// 프레임에 한 번에 점프한다. 대신 rAF 타임스탬프 기준으로 매 프레임 dt 만큼만
// 균일하게 진행하고, 실제 벽시계와의 오차는 프레임당 최대 ±8% 속도 가감으로만
// 서서히 흡수한다 → 점프가 원천적으로 없고, 화면 간 동기화(수십 ms 이내)는 유지된다.
const perfToWall = Date.now() - performance.now(); // 로드 시 1회 추정한 클록 오프셋
let servoClock = null; // 부드럽게 진행되는 "벽시계 근사" (ms)
let servoLastT = null;

function servoNow(rafT) {
  const target = rafT + perfToWall; // 이 프레임의 실제 벽시계
  if (servoClock == null || servoLastT == null || rafT - servoLastT > 1000) {
    servoClock = target; // 첫 프레임/장기 정지 후에는 즉시 동기화(어차피 새로 그림)
  } else {
    const dt = rafT - servoLastT;
    const err = target - (servoClock + dt); // 그대로 진행했을 때 남는 벽시계 오차
    servoClock += dt + Math.max(-dt * 0.08, Math.min(dt * 0.08, err));
  }
  servoLastT = rafT;
  return servoClock;
}

function scrollTick(rafT) {
  // enabled 를 검사하지 않는다 — 정지(fade out) 중에도 남은 칩이 자연스럽게 흘러
  // 나가도록 계속 돌고, 칩이 다 빠지면 스스로 멈춘다(다음 항목 도착 시 재개).
  if (scrollChips.length === 0) {
    scrollRafId = null;
    servoLastT = null; // 루프 중단 동안의 시간은 재시작 시 즉시 재동기화로 처리
    return;
  }
  const now = servoNow(rafT);
  const v = scrollPxPerSec();
  const W = $("scrollbar").clientWidth || window.innerWidth || 1920;
  for (let i = scrollChips.length - 1; i >= 0; i--) {
    const c = scrollChips[i];
    // 우측 끝(W)에서 entry 시각에 진입해 v(px/s)로 좌측 이동. entry 가 미래면 x > W → 아직 화면 밖.
    const x = W - ((now - c.entry) / 1000) * v;
    if (x + c.w < 0) { c.el.remove(); scrollChips.splice(i, 1); continue; } // 왼쪽으로 완전히 퇴장
    // 정수 픽셀로 반올림한다. 텍스트는 서브픽셀 위치에 놓이면(소수점 좌표) 매
    // 프레임 안티에일리어싱이 다시 계산되며 실제 화면에서도 미세하게 흔들려
    // 보인다(녹화와 무관, 육안으로도 보임). 예전엔 위치 자체가 널뛰어(Date.now()
    // 직접 사용) 반올림이 원인처럼 보였지만, 지금은 서보 클록으로 아래 값(x)
    // 자체가 단조 감소이므로 반올림해도 역행이 생기지 않는다(단조 함수에
    // round 를 적용해도 여전히 단조).
    c.el.style.transform = `translate3d(${Math.round(x)}px, 0, 0)`;
  }
  scrollRafId = requestAnimationFrame(scrollTick);
}

// PGM 모드(?pgm=1): 송출(onair) 상태에 따라 그래픽 fade in/out. 그 외(PVW)는 항상 표시.
const PGM = new URLSearchParams(location.search).get("pgm") === "1";
if (PGM) $("stage").style.opacity = "0";
function setOnAir(on) {
  if (!PGM) return;
  $("stage").style.opacity = on ? "1" : "0";
}

function connect() {
  const ws = new WebSocket("ws://" + location.host);
  ws.onopen = () => { $("disc").style.display = "none"; };
  ws.onclose = () => { $("disc").style.display = "block"; setTimeout(connect, 1500); };
  ws.onmessage = (ev) => {
    const { type, data } = JSON.parse(ev.data);
    if (type === "poll") renderPoll(data);
    else if (type === "chat") addChat(data);
    else if (type === "chatHistory") data.forEach(addChat);
    else if (type === "scrollItem") onScrollItem(data);
    else if (type === "scrollHistory") onScrollHistory(data);
    else if (type === "onair") setOnAir(data);
  };
}
connect();
</script>
</body>
